<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Termoenerji Yönetim Paneli</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; }
        input { display: block; margin-bottom: 10px; width: 300px; }
    </style>
</head>
<body>
    <h1>Termoenerji ERP Yönetim Paneli</h1>
    
    <div class="box" id="loginBox">
        <h3>Giriş Yap</h3>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="pass" placeholder="Şifre">
        <button onclick="login()">Giriş Yap</button>
    </div>

    <div class="box" id="productBox" style="display:none;">
        <h3>Yeni Ürün Ekle</h3>
        <input type="text" id="name" placeholder="Ürün Adı">
        <input type="text" id="cat" placeholder="Kategori">
        <input type="number" id="price" placeholder="Fiyat">
        <input type="number" id="stock" placeholder="Stok">
        <button onclick="addProduct()">Kaydet</button>
        <hr>
        <h3>Ürün Listesi</h3>
        <ul id="productList"></ul>
    </div>

    <script>
        let token = "";
        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('pass').value })
            });
            const data = await res.json();
            if(data.token) { token = data.token; document.getElementById('loginBox').style.display = 'none'; document.getElementById('productBox').style.display = 'block'; loadProducts(); }
            else alert(data.hata);
        }

        async function addProduct() {
            const body = { name: document.getElementById('name').value, category: document.getElementById('cat').value, price: parseFloat(document.getElementById('price').value), stock: parseInt(document.getElementById('stock').value) };
            await fetch('/api/urun-ekle', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            loadProducts();
        }

        async function loadProducts() {
            const res = await fetch('/api/urunler');
            const prods = await res.json();
            document.getElementById('productList').innerHTML = prods.map(p => `<li>${p.name} - ${p.price} TL</li>`).join('');
        }
    </script>
</body>
</html>
